---
# ASIP Site Playbook
# Architecture:
#   1. Import infra-proxmox/ansible/site.yml → base hardening (SSH, auditd, AppArmor, UFW, pwquality)
#   2. Apply ASIP hardening role → ANSSI/CIS L1 compliance (faillock, AIDE, immutable audit, SUID, etc.)
#   3. ASIP-specific roles (mcp-watchdog, hybrid-storage)
#
# Usage:
#   Full deploy:         ansible-playbook site.yml
#   Container hardening: ansible-playbook site.yml --tags hardening-container
#   PVE host hardening:  ansible-playbook site.yml --tags host-hardening --limit pve
#   ASIP roles only:    ansible-playbook site.yml --tags asip

- name: Hardening — Base CIS Benchmark (infra-proxmox)
  import_playbook: ../../infra-proxmox/ansible/site.yml
  tags: [hardening, hardening-base]

- name: Hardening — ASIP ANSSI/CIS L1 Compliance (containers + PVE host)
  hosts: all
  become: true
  tags: [hardening, hardening-asip]
  roles:
    - role: hardening

- name: ASIP — MCP Watchdog Agent
  hosts: mcp_watchdogs
  become: true
  tags: [mcp-watchdog, asip, autonomous-ops]
  roles:
    - role: mcp-watchdog

- name: ASIP — Hybrid Storage (rclone + LocalStack S3)
  hosts: vault_servers:collab_servers:mcp_watchdogs
  become: true
  tags: [hybrid-storage, asip, simulate]
  roles:
    - role: hybrid-storage