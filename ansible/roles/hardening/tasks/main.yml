---
# ASIP Hardening Role — ANSSI/CIS L1 Compliance for LXC Containers
# This role COMPLEMENTS the infra-proxmox hardening role.
# It adds: pam_faillock, AIDE, auditd immutable, SUID audit, SSH directives,
#           journald, login banner, world-writable files, unattended-upgrades
#
# Architecture:
#   - tasks/main.yml: Container-applicable tasks (LXC or VM)
#   - tasks/host-pve.yml: Proxmox VE host-only tasks (sysctl kernel.*, module blacklist)
#   - Controlled by: --tags hardening-container vs --tags host-hardening

- name: Validate ansible_distribution
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu" or ansible_distribution == "Debian"
    fail_msg: "This hardening role supports Ubuntu/Debian only. Found: {{ ansible_distribution }}"
    quiet: true

# ============================================================================
# PACKAGE INSTALLATION
# ============================================================================
- name: Install additional security packages
  ansible.builtin.apt:
    name: "{{ hardening_additional_packages }}"
    state: present
    update_cache: true

- name: Remove additional insecure packages
  ansible.builtin.apt:
    name: "{{ hardening_additional_packages_remove }}"
    state: absent
    purge: true
    autoremove: true
  when: hardening_additional_packages_remove | length > 0

# ============================================================================
# PAM — ACCOUNT LOCKOUT (pam_faillock)
# CIS 5.2.1 — ANSSI GCR
# ============================================================================
- name: Configure pam_faillock — auth section
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    regexp: 'auth\s+required\s+pam_faillock\.so\s+preauth'
    line: "auth required pam_faillock.so preauth silent deny={{ hardening_faillock_deny }} unlock_time={{ hardening_faillock_unlock_time }} interval={{ hardening_faillock_interval }}{% if hardening_faillock_even_deny_root %} even_deny_root{% endif %} root_unlock_time={{ hardening_faillock_root_unlock_time }}"
    insertbefore: '^auth\s+\[success=\d+\s+default=ignore\]\s+pam_unix\.so'
  when: hardening_faillock_enabled

- name: Configure pam_faillock — authfail section
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    regexp: 'auth\s+required\s+pam_faillock\.so\s+authfail'
    line: "auth required pam_faillock.so authfail deny={{ hardening_faillock_deny }} unlock_time={{ hardening_faillock_unlock_time }} interval={{ hardening_faillock_interval }}{% if hardening_faillock_even_deny_root %} even_deny_root{% endif %} root_unlock_time={{ hardening_faillock_root_unlock_time }}"
    insertafter: '^auth\s+\[success=\d+\s+default=ignore\]\s+pam_unix\.so'
  when: hardening_faillock_enabled

- name: Configure pam_faillock — account section
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-account
    regexp: 'account\s+required\s+pam_faillock\.so'
    line: "account required pam_faillock.so"
    insertbefore: '^account\s+\[success=\d+\s+new_authtok_reqd=done\s+default=ignore\]\s+pam_unix\.so'
  when: hardening_faillock_enabled

# ============================================================================
# PAM — PASSWORD HISTORY (pam_pwhistory)
# CIS 5.3.3
# ============================================================================
- name: Configure pam_pwhistory — remember
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: 'password\s+required\s+pam_pwhistory\.so'
    line: "password required pam_pwhistory.so remember={{ hardening_pwhistory_remember }} use_authok enforce_for_root"
    insertbefore: '^password\s+\[success=\d+\s+default=ignore\]\s+pam_unix\.so'
  when: hardening_pwhistory_enabled

# ============================================================================
# PAM — PASSWORD HASHING ALGORITHM
# CIS 5.3.1 — yescrypt or SHA512
# ============================================================================
- name: Ensure yescrypt/SHA512 in pam_unix
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: 'password\s+\[success=\d+\s+default=ignore\]\s+pam_unix\.so'
    line: "password [success=1 default=ignore] pam_unix.so obscure use_authok sha512"
    backrefs: true

# ============================================================================
# SSH — ADDITIONAL DIRECTIVES (ANSSI GCR)
# ============================================================================
- name: SSH hardening — HostbasedAuthentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?HostbasedAuthentication'
    line: "HostbasedAuthentication {{ hardening_ssh_hostbased_authentication }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: SSH hardening — IgnoreRhosts
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?IgnoreRhosts'
    line: "IgnoreRhosts {{ hardening_ssh_ignore_rhosts }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: SSH hardening — PermitUserEnvironment
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitUserEnvironment'
    line: "PermitUserEnvironment {{ hardening_ssh_permit_user_environment }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: SSH hardening — MaxStartups
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?MaxStartups'
    line: "MaxStartups {{ hardening_ssh_max_startups }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: SSH hardening — StrictModes
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?StrictModes'
    line: "StrictModes {{ hardening_ssh_strict_modes }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd

# ============================================================================
# AUDITD — IMMUTABLE FLAG (-e 2)
# CIS 4.1.1.4
# ============================================================================
- name: Ensure auditd immutable flag is set
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/audit.rules
    regexp: '^-e'
    line: "-e 2"
    insertafter: EOF
  when: hardening_auditd_immutable
  notify: Restart auditd

# ============================================================================
# AIDE — FILE INTEGRITY MONITORING
# CIS 1.3.1 — ANSSI GCR
# ============================================================================
- name: Initialize AIDE database
  ansible.builtin.command: aideinit -y -f
  args:
    creates: /var/lib/aide/aide.db
  when: hardening_aide_enabled

- name: Set up AIDE cron job (daily integrity check)
  ansible.builtin.cron:
    name: "aide-check"
    hour: "{{ hardening_aide_cron_hour }}"
    minute: "{{ hardening_aide_cron_minute }}"
    job: "/usr/bin/aide --check > /var/log/aide/check-$(date +\\%Y\\%m\\%d).log 2>&1 || /usr/bin/aide --update > /var/log/aide/update-$(date +\\%Y\\%m\\%d).log 2>&1"
    user: root
    cron_file: aide-check
  when: hardening_aide_enabled

- name: Ensure AIDE log directory exists
  ansible.builtin.file:
    path: /var/log/aide
    state: directory
    mode: "0700"
    owner: root
    group: root
  when: hardening_aide_enabled

# ============================================================================
# SUID/SGID REMOVAL
# CIS 6.1.12 — Remove unnecessary SUID binaries
# ============================================================================
- name: Remove SUID bit from unnecessary binaries
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "go-s"
  loop: "{{ hardening_suid_blacklist }}"
  when:
    - hardening_suid_removal_enabled
    - item is exists
  failed_when: false

# ============================================================================
# SYCTL — CONTAINER-APPLICABLE (namespaced)
# ANSSI GCR — Additional network hardening
# ============================================================================
- name: Configure container-applicable sysctl
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value | string }}"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-hardening-asip.conf
  loop: "{{ hardening_container_sysctl | dict2items }}"

# ============================================================================
# LOGIN BANNER
# CIS 1.7 — Legal warning
# ============================================================================
- name: Configure /etc/issue legal banner
  ansible.builtin.copy:
    content: "{{ hardening_issue_banner }}"
    dest: /etc/issue
    owner: root
    group: root
    mode: "0644"

- name: Configure /etc/issue.net legal banner
  ansible.builtin.copy:
    content: "{{ hardening_issue_banner }}"
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"

# ============================================================================
# JOURNALD CONFIGURATION
# CIS 4.2.1 — Persistent logging
# ============================================================================
- name: Configure journald — persistent storage
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?Storage="
    line: "Storage={{ hardening_journald_storage }}"
  notify: Restart systemd-journald

- name: Configure journald — max disk usage
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?SystemMaxUse="
    line: "SystemMaxUse={{ hardening_journald_system_max_use }}"
  notify: Restart systemd-journald

- name: Configure journald — max files
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?SystemMaxFiles="
    line: "SystemMaxFiles={{ hardening_journald_system_max_files }}"
  notify: Restart systemd-journald

- name: Configure journald — max syslog level
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?MaxLevelSyslog="
    line: "MaxLevelSyslog={{ hardening_journald_max_level_syslog }}"
  notify: Restart systemd-journald

- name: Ensure journald log directory exists
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    mode: "2755"
    owner: root
    group: systemd-journal

# ============================================================================
# WORLD-WRITABLE FILES AND DIRECTORIES
# CIS 6.1.9, 6.1.10
# ============================================================================
- name: Find world-writable files
  ansible.builtin.command: find / -xdev -type f -perm /0002 -not -path "/proc/*" -not -path "/sys/*"
  register: world_writable_files
  changed_when: false
  failed_when: false
  when: hardening_fix_world_writable

- name: Remove world-writable permission from files
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "o-w"
  loop: "{{ world_writable_files.stdout_lines | default([]) }}"
  when:
    - hardening_fix_world_writable
    - world_writable_files.stdout_lines | length > 0
  failed_when: false

- name: Ensure sticky bit on world-writable directories
  ansible.builtin.shell: |
    find / -xdev -type d -perm /0002 -not -path "/proc/*" -not -path "/sys/*" -exec chmod +t {} \;
  changed_when: false
  when: hardening_sticky_bit_world_writable
  failed_when: false

# ============================================================================
# ROOT ACCOUNT RESTRICTIONS
# CIS 5.4.1 — No duplicate UID 0 accounts
# ============================================================================
- name: Verify no duplicate UID 0 accounts exist
  ansible.builtin.shell: "awk -F: '($3 == 0) {print $1}' /etc/passwd"
  register: uid0_accounts
  changed_when: false
  when: hardening_ensure_no_duplicate_uid0

- name: Warn if multiple UID 0 accounts exist
  ansible.builtin.debug:
    msg: "WARNING: Multiple UID 0 accounts found: {{ uid0_accounts.stdout_lines | join(', ') }}. Only 'root' should exist."
  when:
    - hardening_ensure_no_duplicate_uid0
    - uid0_accounts.stdout_lines | length > 1

# ============================================================================
# UNATTENDED UPGRADES (security only)
# CIS 1.9
# ============================================================================
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  when: hardening_unattended_upgrades_enabled

- name: Configure unattended-upgrades — security only
  ansible.builtin.copy:
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::Package-Blacklist {};
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
      {% if hardening_unattended_automatic_reboot %}
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";
      {% else %}
      Unattended-Upgrade::Automatic-Reboot "false";
      {% endif %}
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  when: hardening_unattended_upgrades_enabled

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  when: hardening_unattended_upgrades_enabled

# ============================================================================
# HOST-ONLY TASKS (PVE Hypervisor)
# Run with: ansible-playbook --tags host-hardening
# ============================================================================
- name: Include host-only hardening tasks
  ansible.builtin.include_tasks: host-pve.yml
  tags: [host-hardening]
  when: ansible_virtualization_type == "host" or (ansible_system_vendor == "QEMU" and ansible_virtualization_role == "host")