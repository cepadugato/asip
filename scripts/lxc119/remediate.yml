---
- name: Remediate SSH drift
  hosts: all
  become: true
  tasks:
    - name: Ensure PermitRootLogin is yes
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin yes'
      tags: [hardening]
      notify: Restart sshd
  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted
      tags: [hardening]
