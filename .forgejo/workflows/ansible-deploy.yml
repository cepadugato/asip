name: Ansible Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'mcp-agent/**'
  workflow_dispatch:

jobs:
  ansible-lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/asip-ci
          git clone --depth=1 http://git:${{ secrets.GIT_TOKEN }}@192.168.100.1:3000/git/asip.git /tmp/asip-ci

      - name: Install Ansible
        run: |
          apt-get update -qq && apt-get install -qq -y python3-pip > /dev/null 2>&1
          pip3 install ansible-core
          ansible-galaxy collection install community.general ansible.posix

      - name: Ansible Syntax Check
        run: |
          cd /tmp/asip-ci/ansible
          ansible-playbook site.yml --syntax-check

      - name: Ansible Dry Run (mcp-watchdog role only)
        run: |
          cd /tmp/asip-ci/ansible
          ansible-playbook site.yml --check --diff \
            -i inventory/prod.yml \
            --limit mcp_watchdogs \
            --tags mcp-watchdog \
            --connection=local \
            -e "ansible_host=localhost ansible_connection=local" || true