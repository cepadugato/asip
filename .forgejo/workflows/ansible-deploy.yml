name: Ansible Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'mcp-agent/**'
  workflow_dispatch:

jobs:
  ansible-lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/asip-ci
          git clone --depth=1 http://git:${{ secrets.GIT_TOKEN }}@192.168.100.1:3000/git/asip.git /tmp/asip-ci

      - name: Install Ansible
        run: |
          apt-get update -qq && apt-get install -qq -y python3-pip > /dev/null 2>&1
          pip3 install --break-system-packages ansible-core
          ansible-galaxy collection install community.general ansible.posix

      - name: Ansible Role Syntax Check
        run: |
          cd /tmp/asip-ci/ansible
          # Write a temporary playbook for each ASIP role
          for role_dir in roles/*/; do
            role_name=$(basename "$role_dir")
            echo "Checking role: $role_name"
            cat > /tmp/test-playbook.yml <<EOF
          ---
          - hosts: localhost
            become: true
            roles:
              - role: $role_name
          EOF
            ansible-playbook /tmp/test-playbook.yml -i localhost, --connection=local \
              -e "ansible_python_interpreter=/usr/bin/python3" \
              --syntax-check || exit 1
            rm -f /tmp/test-playbook.yml
          done

      - name: Ansible Dry Run (mcp-watchdog role only)
        run: |
          cd /tmp/asip-ci/ansible
          # Dry run the watchdog play only (skip hardening import)
          ansible-playbook site.yml --check --diff \
            -i inventory/prod.yml \
            --limit mcp_watchdogs \
            --tags mcp-watchdog \
            --skip-tags hardening \
            --connection=local \
            -e "ansible_host=localhost ansible_connection=local" || true