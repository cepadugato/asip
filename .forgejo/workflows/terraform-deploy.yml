name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'localstack/terraform/**'
  workflow_dispatch:

jobs:
  terraform-localstack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tflocal
        run: pip install terraform-local

      - name: Start LocalStack
        run: |
          cd localstack
          docker compose up -d
          sleep 15

      - name: Terraform Init LocalStack
        run: |
          cd localstack/terraform
          tflocal init -input=false

      - name: Terraform Plan LocalStack
        run: |
          cd localstack/terraform
          tflocal plan -out=tfplan

      - name: Terraform Apply LocalStack
        if: github.ref == 'refs/heads/main'
        run: |
          cd localstack/terraform
          tflocal apply -auto-approve tfplan

  terraform-proxmox-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        run: |
          curl -fsSL https://releases.hashicorp.com/terraform/1.13.1/terraform_1.13.1_linux_amd64.zip -o /tmp/terraform.zip
          unzip /tmp/terraform.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/terraform
          terraform version

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -upgrade

      - name: Terraform Plan (read-only)
        run: |
          cd terraform
          terraform plan -input=false -parallelism=1 -var="proxmox_token=${{ secrets.PROXMOX_TOKEN }}" -out=tfplan