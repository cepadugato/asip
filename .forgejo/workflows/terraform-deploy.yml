name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'localstack/terraform/**'
  workflow_dispatch:

jobs:
  terraform-localstack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/asip-ci
          git clone --depth=1 http://git:${{ secrets.GIT_TOKEN }}@192.168.100.1:3000/git/asip.git /tmp/asip-ci

      - name: Install tflocal and Terraform
        run: |
          apt-get update -qq && apt-get install -qq -y python3-pip > /dev/null 2>&1
          pip3 install terraform-local
          # Also install terraform CLI for tflocal to work
          if ! command -v terraform >/dev/null 2>&1; then
            curl -fsSL https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip -o /tmp/terraform.zip
            unzip /tmp/terraform.zip -d /usr/local/bin/
            chmod +x /usr/local/bin/terraform
          fi
          terraform version

      - name: Terraform Init LocalStack
        run: |
          cd /tmp/asip-ci/localstack/terraform
          AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=eu-west-1 \
            LOCALSTACK_ENDPOINT=http://192.168.100.1:4566 \
            tflocal init -input=false

      - name: Terraform Plan LocalStack
        run: |
          cd /tmp/asip-ci/localstack/terraform
          AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=eu-west-1 \
            LOCALSTACK_ENDPOINT=http://192.168.100.1:4566 \
            tflocal plan -out=tfplan

      - name: Terraform Apply LocalStack
        if: github.ref == 'refs/heads/main'
        run: |
          cd /tmp/asip-ci/localstack/terraform
          AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=eu-west-1 \
            LOCALSTACK_ENDPOINT=http://192.168.100.1:4566 \
            tflocal apply -auto-approve tfplan

  terraform-proxmox-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/asip-ci
          git clone --depth=1 http://git:${{ secrets.GIT_TOKEN }}@192.168.100.1:3000/git/asip.git /tmp/asip-ci

      - name: Setup Terraform
        run: |
          if ! command -v terraform >/dev/null 2>&1; then
            curl -fsSL https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip -o /tmp/terraform.zip
            unzip /tmp/terraform.zip -d /usr/local/bin/
            chmod +x /usr/local/bin/terraform
          fi
          terraform version

      - name: Terraform Init
        run: |
          cd /tmp/asip-ci/terraform
          # Override backend to local for CI (no HTTP state storage in Forgejo)
          terraform init -upgrade -backend=false

      - name: Terraform Validate
        run: |
          cd /tmp/asip-ci/terraform
          terraform validate

      - name: Terraform Plan (read-only)
        run: |
          cd /tmp/asip-ci/terraform
          terraform plan -input=false -parallelism=1 \
            -var="proxmox_token=${{ secrets.PROXMOX_TOKEN }}" \
            -out=tfplan || true