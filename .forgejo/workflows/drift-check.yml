name: Drift Check

on:
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'mcp-agent/**'
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/asip-ci
          git clone --depth=1 http://git:${{ secrets.GIT_TOKEN }}@192.0.2.1:3000/git/asip.git /tmp/asip-ci

      - name: Check watchdog status (self-check)
        run: |
          mkdir -p /tmp/asip-ci/goss-results
          for host_ip in 192.0.2.19; do
            curl -sf "http://${host_ip}:8080/status" > "/tmp/asip-ci/goss-results/${host_ip}.json" 2>/dev/null || echo '{}' > "/tmp/asip-ci/goss-results/${host_ip}.json"
          done

      - name: Check for drift
        run: |
          cd /tmp/asip-ci
          python3 -c "
          import json, glob, sys
          total_failed = 0
          hosts_with_drift = []
          for f in glob.glob('goss-results/*.json'):
              try:
                  data = json.load(open(f))
                  for host, host_data in data.items():
                      failed = host_data.get('consecutive_failures', 0)
                      if failed > 0:
                          hosts_with_drift.append(f'{host}: {failed} consecutive failures')
                          total_failed += failed
              except:
                  pass
          if total_failed > 0:
              print(f'DRIFT DETECTED on {len(hosts_with_drift)} hosts:')
              for h in hosts_with_drift:
                  print(f'  - {h}')
              sys.exit(1)
          else:
              print('No drift detected - all hosts conformant')
          "