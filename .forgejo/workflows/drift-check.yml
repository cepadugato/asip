name: Drift Check

on:
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'mcp-agent/**'
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Goss
        run: |
          curl -fsSL https://github.com/goss-org/goss/releases/download/v0.4.8/goss-linux-amd64 -o /usr/local/bin/goss
          chmod +x /usr/local/bin/goss

      - name: Run Goss validation on watchdog (self-check)
        run: |
          mkdir -p goss-results
          for host_ip in 192.168.100.119; do
            curl -sf "http://${host_ip}:8080/status" > "goss-results/${host_ip}.json" 2>/dev/null || echo '{}' > "goss-results/${host_ip}.json"
          done

      - name: Check for drift
        run: |
          python3 -c "
          import json, glob, sys
          total_failed = 0
          hosts_with_drift = []
          for f in glob.glob('goss-results/*.json'):
              try:
                  data = json.load(open(f))
                  for host, host_data in data.items():
                      failed = host_data.get('consecutive_failures', 0)
                      if failed > 0:
                          hosts_with_drift.append(f'{host}: {failed} consecutive failures')
                          total_failed += failed
              except:
                  pass
          if total_failed > 0:
              print(f'DRIFT DETECTED on {len(hosts_with_drift)} hosts:')
              for h in hosts_with_drift:
                  print(f'  - {h}')
              sys.exit(1)
          else:
              print('No drift detected - all hosts conformant')
          "

      - name: Upload drift results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: goss-results
          path: goss-results/*.json