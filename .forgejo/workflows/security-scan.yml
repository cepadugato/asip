name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'terraform/**'
      - 'mcp-agent/**'
      - 'localstack/**'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/asip-ci
          git clone --depth=1 http://git:${{ secrets.GIT_TOKEN }}@${{ vars.FORGEJO_HOST }}:3000/git/asip.git /tmp/asip-ci

      - name: Install Trivy
        run: |
          if ! command -v trivy >/dev/null 2>&1; then
            curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz -o /tmp/trivy.tar.gz
            tar -xzf /tmp/trivy.tar.gz -C /tmp
            mv /tmp/trivy /usr/local/bin/trivy
            chmod +x /usr/local/bin/trivy
          fi

      - name: Scan IaC and Python code for vulnerabilities
        run: |
          cd /tmp/asip-ci
          trivy fs --severity CRITICAL,HIGH --format json --output trivy-fs-results.json . || true
          trivy fs --severity CRITICAL,HIGH --format table . || true

      - name: Scan Terraform for misconfigurations
        run: |
          cd /tmp/asip-ci
          trivy config --severity CRITICAL,HIGH --format json --output trivy-tf-results.json terraform/ localstack/terraform/ || true

      - name: Evaluate results
        run: |
          cd /tmp/asip-ci
          python3 -c "
          import json, glob, sys
          total = 0
          critical = 0
          for f in glob.glob('trivy-*.json'):
              try:
                  data = json.load(open(f))
                  for r in data.get('Results', []):
                      for v in r.get('Vulnerabilities', []):
                          total += 1
                          if v.get('Severity') == 'CRITICAL':
                              critical += 1
                      for m in r.get('Misconfigurations', []):
                          total += 1
                          if m.get('Severity') == 'CRITICAL':
                              critical += 1
              except:
                  pass
          print(f'Total findings: {total}, CRITICAL: {critical}')
          if critical > 0:
              print('BLOCKING: Critical vulnerabilities found!')
              sys.exit(1)
          print('PASSED: No critical vulnerabilities')
          "